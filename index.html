<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府標案探勘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --bg: #fafaf7;
  --surface: #ffffff;
  --surface-soft: #f5f5f0;
  --border: #e8e6e0;
  --border-strong: #d4d2cc;
  --text: #1c1c1a;
  --text-soft: #6b6963;
  --text-faint: #a09d95;
  --accent: #c1342e;
  --accent-soft: #fef2f2;
  --tender: #1e40af;
  --tender-soft: #eff6ff;
  --award: #166534;
  --award-soft: #f0fdf4;
  --rental: #92400e;
  --rental-soft: #fef3c7;
  --sell: #155e75;
  --sell-soft: #ecfeff;
  --amend: #7c3aed;
  --amend-soft: #f5f3ff;
  --other: #525252;
  --other-soft: #f5f5f4;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(28,28,26,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* Spinner */
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Layout */
.topbar { position: sticky; top: 0; z-index: 50; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-soft); }
.layout { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 44px); }
@media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }

/* Sidebar */
.sidebar { padding: 24px; border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; }
.sb-brand { font-family: var(--serif); font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.sb-brand em { color: var(--accent); font-style: normal; }
.sb-desc { font-size: 12px; color: var(--text-soft); margin-bottom: 24px; line-height: 1.6; }
.sb-section { margin-bottom: 18px; }
.sb-label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; font-weight: 500; }
.sb-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--sans); font-size: 13px; background: var(--bg); transition: border-color 0.15s; }
.sb-input:focus { outline: none; border-color: var(--text); }
.sb-hint { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
.sb-select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--sans); font-size: 13px; background: var(--bg); }

/* Type checkboxes */
.type-checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
.type-cb { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); cursor: pointer; font-size: 12px; transition: all 0.12s; }
.type-cb:hover { border-color: var(--border-strong); }
.type-cb input { margin: 0; cursor: pointer; accent-color: var(--text); }
.type-cb-tag { font-family: var(--mono); font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 3px; }
.type-cb-tag.t-tender { background: var(--tender-soft); color: var(--tender); }
.type-cb-tag.t-award { background: var(--award-soft); color: var(--award); }
.type-cb-tag.t-rental { background: var(--rental-soft); color: var(--rental); }
.type-cb-tag.t-sell { background: var(--sell-soft); color: var(--sell); }
.type-cb-tag.t-amend { background: var(--amend-soft); color: var(--amend); }
.type-cb-tag.t-other { background: var(--other-soft); color: var(--other); }
.type-quick { display: flex; gap: 4px; }
.type-quick button { flex: 1; padding: 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; font-family: var(--sans); font-size: 11px; color: var(--text-soft); cursor: pointer; }
.type-quick button:hover { color: var(--text); background: var(--surface-soft); }

/* Date quick buttons */
.date-quick { display: flex; gap: 4px; margin-bottom: 8px; }
.date-quick button { flex: 1; padding: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; font-family: var(--sans); font-size: 12px; cursor: pointer; color: var(--text-soft); }
.date-quick button.active { background: var(--text); color: var(--surface); border-color: var(--text); }
.date-row { display: flex; gap: 6px; align-items: center; font-size: 12px; color: var(--text-soft); }
.date-row input { flex: 1; }

/* Buttons */
.sb-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-primary { flex: 1; padding: 12px; background: var(--text); color: var(--surface); border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.btn-primary:hover { background: #000; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { padding: 12px; background: var(--bg); color: var(--text-soft); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--sans); font-size: 13px; cursor: pointer; }
.btn-secondary:hover { color: var(--text); }

/* Main area */
.main { padding: 24px 28px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat.accent { background: #fef2f2; border-color: #fecaca; }
.stat-label { font-size: 11px; color: var(--text-faint); margin-bottom: 6px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
@media (max-width: 600px) { .stats { grid-template-columns: 1fr 1fr; } }

/* Result header */
.result-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.result-head-title { font-size: 13px; color: var(--text-soft); }

/* Cards */
.result-body { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-height: 200px; }
.tender-card { border-bottom: 1px solid var(--border); position: relative; transition: background 0.12s; }
.tender-card::before { content:''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background 0.12s; }
.tender-card:hover { background: var(--surface-soft); }
.tender-card:hover::before { background: var(--accent); }
.tender-card:last-child { border-bottom: none; }
.tender-card-main { padding: 18px 22px 14px; cursor: pointer; }
.tender-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.tag { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 3px; letter-spacing: 0.06em; }
.tag-tender { background: var(--tender-soft); color: var(--tender); }
.tag-award { background: var(--award-soft); color: var(--award); }
.tag-rental { background: var(--rental-soft); color: var(--rental); }
.tag-sell { background: var(--sell-soft); color: var(--sell); }
.tag-amend { background: var(--amend-soft); color: var(--amend); }
.tag-other { background: var(--other-soft); color: var(--other); }
.tender-date { font-family: var(--mono); font-size: 12px; color: var(--text-soft); }
.tender-amount { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--accent); margin-left: auto; }
.tender-title { font-family: var(--serif); font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
.tender-unit { font-size: 13px; color: var(--text-soft); }
.tender-unit::before { content:'·'; margin-right: 6px; }

/* Card meta row (截標/開標/金額) */
.tender-meta { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; }
.meta-item { display: inline-flex; align-items: baseline; gap: 5px; }
.meta-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); font-weight: 600; }
.meta-val { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 500; }
.meta-val.urgent { color: var(--accent); font-weight: 700; }
.meta-val.urgent::after { content: ' ⚠'; font-size: 11px; }
.meta-na { color: var(--text-faint); font-size: 11px; font-style: italic; }

/* Siblings badge & bar */
.sib-badge { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 3px; background: #fef3c7; color: #92400e; margin-left: auto; }
.tender-sib-bar { padding: 0 22px 14px; margin-top: -4px; }
.tender-sib-bar button { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: #fef3c7; color: #78350f; border: none; border-radius: 12px; font-family: var(--sans); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
.tender-sib-bar button:hover { background: #fde68a; }

/* Siblings expand */
.tender-siblings { margin: 0 20px 12px; padding: 12px 14px; background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius); }
.sib-header { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: #92400e; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed #fde68a; }
.sib-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: none; background: none; width: 100%; text-align: left; font-family: var(--sans); font-size: 12px; color: var(--text); cursor: pointer; border-radius: 4px; transition: background 0.12s; }
.sib-row:hover { background: rgba(254,243,199,0.6); }
.sib-row-main { background: rgba(254,243,199,0.4); font-weight: 500; }
.sib-date { font-family: var(--mono); font-size: 11px; color: var(--text-soft); }
.sib-amount { font-family: var(--mono); font-weight: 500; margin-left: auto; }
.sib-arrow { color: var(--text-faint); font-size: 11px; opacity: 0.4; }
.sib-row:hover .sib-arrow { opacity: 1; color: var(--accent); }

/* Detail panel */
.detail-overlay { position: fixed; inset: 0; background: rgba(28,28,26,0.32); backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 200; }
.detail-overlay.show { opacity: 1; pointer-events: auto; }
.detail-panel { position: fixed; top: 0; right: 0; width: 520px; max-width: calc(100vw - 20px); height: 100vh; background: var(--bg); border-left: 1px solid var(--border); box-shadow: -12px 0 48px rgba(28,28,26,0.1); transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0.24,1); z-index: 201; display: flex; flex-direction: column; }
.detail-panel.show { transform: translateX(0); }
.detail-head { padding: 22px 26px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; background: var(--surface); }
.detail-head-info { flex: 1; min-width: 0; }
.detail-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-faint); margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
.detail-title { font-family: var(--serif); font-size: 20px; font-weight: 600; line-height: 1.35; margin-bottom: 8px; }
.detail-unit { font-size: 13px; color: var(--text-soft); font-weight: 500; }
.detail-close { border: 1px solid var(--border); background: var(--surface); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--text-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.detail-close:hover { background: var(--text); color: var(--surface); border-color: var(--text); transform: rotate(90deg); }

.detail-body { flex: 1; overflow-y: auto; padding: 0 26px 26px; }
.detail-body::-webkit-scrollbar { width: 6px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* Detail hero cards */
.detail-hero { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.hero-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.hero-item.urgent { background: var(--accent-soft); border-color: #fecaca; }
.hero-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 5px; }
.hero-value { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); }
.hero-item.urgent .hero-value { color: var(--accent); }

/* Detail sections */
.detail-section { margin-top: 22px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
.detail-sec-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.detail-grid { display: flex; flex-direction: column; gap: 12px; }
.d-row { display: grid; grid-template-columns: 100px 1fr; gap: 4px 14px; align-items: baseline; font-size: 13px; }
.d-row.long { grid-template-columns: 1fr; }
.d-row dt { color: var(--text-faint); font-size: 11px; margin: 0; }
.d-row.long dt { border-left: 2px solid var(--border-strong); padding-left: 8px; font-weight: 500; }
.d-row dd { color: var(--text); margin: 0; word-break: break-word; white-space: pre-line; line-height: 1.6; }
.d-row.long dd { padding-left: 10px; }
.d-row dd.amt { font-family: var(--mono); font-weight: 600; color: var(--accent); font-size: 15px; }
.d-row dd.co { color: var(--award); font-weight: 500; }
.d-row dd.tm { font-family: var(--mono); font-weight: 500; }

/* Timeline in detail panel */
.detail-tl { padding: 0; overflow: hidden; }
.tl-toggle { display: flex; align-items: center; gap: 8px; width: 100%; padding: 14px 18px; border: none; background: transparent; cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-soft); text-align: left; transition: background 0.12s; }
.tl-toggle:hover { background: var(--surface-soft); }
.tl-toggle-arrow { margin-left: auto; font-size: 12px; }
.tl-item { border-bottom: 1px solid var(--border); }
.tl-item:last-child { border-bottom: none; }
.tl-row { display: grid; grid-template-columns: 24px 1fr 44px; gap: 8px; padding: 12px 18px; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; font-size: inherit; color: inherit; cursor: pointer; transition: background 0.12s; }
.tl-row:hover { background: var(--surface-soft); }
.tl-row.tl-latest { background: rgba(254,243,199,0.35); }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; }
.tl-type { font-size: 13px; font-weight: 500; }
.tl-tag-latest { font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 2px 6px; background: #fef3c7; color: #78350f; border-radius: 3px; }
.tl-meta { display: flex; gap: 10px; font-size: 12px; margin-top: 2px; }
.tl-date { font-family: var(--mono); color: var(--text-soft); }
.tl-amt { font-family: var(--mono); font-weight: 600; color: var(--accent); }
.tl-co { font-size: 12px; color: var(--award); font-weight: 500; margin-top: 2px; }
.tl-arrow { font-size: 11px; font-weight: 500; color: var(--text-faint); align-self: center; text-align: right; opacity: 0.4; transition: all 0.12s; }
.tl-row:hover .tl-arrow { opacity: 1; color: var(--accent); }
.tl-expand { background: var(--bg); border-top: 1px dashed var(--border); padding: 14px 18px 14px 50px; }
.tl-d-row { display: grid; grid-template-columns: 90px 1fr; gap: 4px 12px; font-size: 12px; margin-bottom: 6px; }
.tl-d-row.long { grid-template-columns: 1fr; }
.tl-d-label { color: var(--text-faint); font-size: 11px; }
.tl-d-value { color: var(--text); white-space: pre-line; word-break: break-word; line-height: 1.5; }

/* Detail actions */
.detail-actions { padding: 16px 26px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surface); }
.detail-actions a { flex: 1; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.detail-actions .act-primary { background: var(--text); color: var(--surface); }
.detail-actions .act-primary:hover { background: #000; }
.detail-actions .act-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

/* Cache badge */
.cache-badge { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-family: var(--mono); font-size: 12px; color: var(--text-soft); box-shadow: var(--shadow); z-index: 90; }
.cache-badge span { color: var(--accent); font-weight: 600; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); padding: 10px 18px; border-radius: 6px; font-size: 13px; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 300; }
.toast.show { opacity: 1; }

/* Empty state */
.state { text-align: center; padding: 60px 20px; color: var(--text-soft); }
.state-icon { font-size: 32px; margin-bottom: 12px; }
.state-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.state-desc { font-size: 13px; line-height: 1.7; }

@media (max-width: 860px) {
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 16px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .detail-panel { width: 100%; max-width: 100%; }
}
</style>
</head>
<body>

<div class="topbar">
  <span>政府標案探勘 — 即時搜尋工具</span>
  <span id="topbar-meta">準備就緒</span>
</div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">政府標案<em>探勘</em></div>
    <div class="sb-desc">從 g0v 開放標案資料庫即時查詢,所有條件可組合篩選。</div>

    <div class="sb-section">
      <label class="sb-label">主要關鍵字</label>
      <input class="sb-input" id="query" value="資訊" placeholder="向資料源查詢時用,建議寬鬆一點。">
      <div class="sb-hint">向資料源查詢時用,建議寬鬆一點。</div>
    </div>
    <div class="sb-section">
      <label class="sb-label">必須包含的字（且）</label>
      <input class="sb-input" id="include" placeholder="標題必須「全部」包含,例:資訊,系統">
      <div class="sb-hint">多個用逗號分隔</div>
    </div>
    <div class="sb-section">
      <label class="sb-label">排除的字（不要）</label>
      <input class="sb-input" id="exclude" value="維護, 保養" placeholder="多個用逗號分隔">
      <div class="sb-hint">標題出現任一個就排除。</div>
    </div>
    <div class="sb-section">
      <label class="sb-label">機關名稱</label>
      <input class="sb-input" id="unit" placeholder="例:臺中">
      <div class="sb-hint">政府用「臺」不是「台」。</div>
    </div>
    <div class="sb-section">
      <label class="sb-label">公告日期範圍</label>
      <div class="date-quick" id="date-quick">
        <button data-days="7">7 天</button>
        <button data-days="30">30 天</button>
        <button data-days="90">90 天</button>
        <button data-days="">全部</button>
      </div>
      <div class="date-row">
        <input class="sb-input" type="date" id="date-from"> <span>到</span> <input class="sb-input" type="date" id="date-to">
      </div>
      <div class="sb-hint">留空代表不限。快速鈕會自動填入日期。</div>
    </div>
    <div class="sb-section">
      <label class="sb-label">公告類型 <span style="text-transform:none;letter-spacing:0;color:var(--text-faint)">(可複選)</span></label>
      <div class="type-checkboxes" id="type-group">
        <label class="type-cb"><input type="checkbox" value="tender" checked><span class="type-cb-tag t-tender">招標</span></label>
        <label class="type-cb"><input type="checkbox" value="award" checked><span class="type-cb-tag t-award">決標</span></label>
        <label class="type-cb"><input type="checkbox" value="rental"><span class="type-cb-tag t-rental">財物出租</span></label>
        <label class="type-cb"><input type="checkbox" value="sell"><span class="type-cb-tag t-sell">財物變賣</span></label>
        <label class="type-cb"><input type="checkbox" value="amend"><span class="type-cb-tag t-amend">更正</span></label>
        <label class="type-cb"><input type="checkbox" value="other"><span class="type-cb-tag t-other">其他</span></label>
      </div>
      <div class="type-quick">
        <button id="type-all">全選</button>
        <button id="type-none">全不選</button>
        <button id="type-reset">預設</button>
      </div>
    </div>
    <div class="sb-section">
      <label class="sb-label">抓取頁數</label>
      <select class="sb-select" id="pages">
        <option value="1">1 頁（約 100 筆）</option>
        <option value="2">2 頁</option>
        <option value="3" selected>3 頁</option>
        <option value="5">5 頁</option>
      </select>
    </div>
    <div class="sb-actions">
      <button class="btn-primary" id="btn-search">開始搜尋</button>
      <button class="btn-secondary" id="btn-export" disabled>匯出 CSV</button>
      <button class="btn-secondary" id="btn-reset">重置</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="stats">
      <div class="stat"><div class="stat-label">符合條件</div><div class="stat-value" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">招標公告</div><div class="stat-value" id="s-tender">—</div></div>
      <div class="stat"><div class="stat-label">決標公告</div><div class="stat-value" id="s-award">—</div></div>
      <div class="stat accent"><div class="stat-label">總金額</div><div class="stat-value" id="s-amount">—</div></div>
    </div>
    <div class="result-head">
      <span class="result-head-title" id="result-head-title">結果列表</span>
      <select class="sb-select" id="sort" style="width:auto;">
        <option value="date-desc">日期新→舊</option>
        <option value="date-asc">日期舊→新</option>
        <option value="amount-desc">金額高→低</option>
        <option value="amount-asc">金額低→高</option>
      </select>
    </div>
    <div class="result-body" id="result-body">
      <div class="state"><div class="state-icon">🔍</div><div class="state-title">輸入關鍵字開始搜尋</div><div class="state-desc">從左側填寫條件後按「開始搜尋」</div></div>
    </div>
  </main>
</div>

<!-- Detail panel -->
<div class="detail-overlay" id="detail-overlay"></div>
<aside class="detail-panel" id="detail-panel">
  <div class="detail-head">
    <div class="detail-head-info" id="detail-head-info"></div>
    <button class="detail-close" id="detail-close">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</aside>

<!-- Cache badge -->
<div class="cache-badge" id="cache-badge" style="display:none;"><span id="cache-count">0</span> 筆已載入</div>

<div class="toast" id="toast"></div>

<script>
// ==========================================
// 標案探勘 — 完整重建版
// ==========================================
const API = 'https://pcc-api.openfun.app/api/searchbytitle';
const STORAGE_KEY = 'tender_explorer_v2';
const $ = id => document.getElementById(id);
const escHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let currentResults = [];
let currentTypes = new Set(['tender','award']);
window._searchId = 0;

// ----- Utilities -----
function parseList(s) { return String(s||'').split(/[,,]/).map(x=>x.trim()).filter(Boolean); }

function classifyType(t) {
  t = t || '';
  if (t.indexOf('更正') !== -1) return 'amend';
  if (t.indexOf('決標') !== -1 || t.indexOf('無法決標') !== -1 || t.indexOf('廢標') !== -1) return 'award';
  if (t.indexOf('財物出租') !== -1 || (t.indexOf('出租') !== -1 && t.indexOf('招標') === -1)) return 'rental';
  if (t.indexOf('財物變賣') !== -1 || t.indexOf('變賣') !== -1) return 'sell';
  if (t.indexOf('招標') !== -1 || t.indexOf('公開取得') !== -1 || t.indexOf('限制性') !== -1 || t.indexOf('議價') !== -1) return 'tender';
  return 'other';
}

const typeLabels = {tender:'招標',award:'決標',rental:'出租',sell:'變賣',amend:'更正',other:'其他'};

function fmtDate(d) {
  d = String(d||'');
  return d.length === 8 ? d.substr(0,4)+'.'+d.substr(4,2)+'.'+d.substr(6,2) : d;
}

function fmtMoney(n) {
  n = Number(n);
  if (!n || isNaN(n)) return '';
  if (n >= 100000000) return 'NT$ ' + (n/100000000).toFixed(1) + ' 億';
  if (n >= 10000) return 'NT$ ' + (n/10000).toFixed(1) + ' 萬';
  return 'NT$ ' + n.toLocaleString();
}

function fmtTotalAmount(n) {
  if (!n) return '—';
  return fmtMoney(n);
}

function fmtTimeStr(raw) {
  if (!raw) return '';
  raw = String(raw).trim();
  if (raw.indexOf('/') !== -1) return raw;
  const m = raw.match(/^(\d{3})(\d{2})(\d{2})(\d{2})?(\d{2})?/);
  if (m) { let s = m[1]+'/'+m[2]+'/'+m[3]; if (m[4]) s += ' '+m[4]+(m[5]?':'+m[5]:''); return s; }
  return raw;
}

function isUrgent(ts) {
  if (!ts) return false;
  const m = ts.match(/^(\d{3})\/(\d{2})\/(\d{2})/);
  if (!m) return false;
  const t = new Date(parseInt(m[1])+1911, parseInt(m[2])-1, parseInt(m[3]));
  return (t - new Date()) / 86400000 >= 0 && (t - new Date()) / 86400000 <= 7;
}

function looksLikeAmount(v) {
  if (!v) return false;
  const s = String(v);
  if (/^[是否不公開無未填]+$/.test(s.trim())) return false;
  return (s.match(/\d/g)||[]).length >= 4;
}

function getAmount(rec) {
  const b = rec.brief || {};
  const candidates = [b.companies&&b.companies.amount, b.amount, b.budget, b.award_amount, rec.amount];
  for (const v of candidates) { if (v != null) { const n = Number(v); if (!isNaN(n) && n > 0 && String(v).length > 3) return n; } }
  return 0;
}

function extractCompanies(rec, brief) {
  const names = new Set();
  brief = brief || {};
  const cands = [
    brief.companies&&brief.companies.names,
    brief.companies&&brief.companies.name_key&&Object.keys(brief.companies.name_key),
    brief.companies&&brief.companies.id_key&&Object.values(brief.companies.id_key),
    rec.companies&&rec.companies.names,
    brief.award_companies,
  ];
  for (const c of cands) {
    if (!c) continue;
    if (Array.isArray(c)) c.forEach(x => { if (typeof x==='string'&&x.trim()) names.add(x.trim()); else if (x&&x.name) names.add(x.name.trim()); });
    else if (typeof c==='string'&&c.trim()) c.split(/[,,、;;]/).forEach(s => { if (s.trim()) names.add(s.trim()); });
  }
  return Array.from(names);
}

function extractAmount(rec, brief) {
  brief = brief || {};
  const cands = [brief.companies&&brief.companies.amount, brief.amount, brief.budget, brief.award_amount, rec.amount];
  for (const v of cands) { if (v!=null) { const n=Number(v); if (!isNaN(n)&&n>0) return n; } }
  return 0;
}

function cleanText(v) {
  return String(v).replace(/\t/g,' ').replace(/\u3000/g,' ').replace(/ {2,}/g,' ').replace(/\n{3,}/g,'\n\n').replace(/^[ \n]+|[ \n]+$/g,'');
}

function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ----- Date quick buttons -----
document.querySelectorAll('#date-quick button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#date-quick button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const days = btn.dataset.days;
    if (!days) { $('date-from').value = ''; $('date-to').value = ''; return; }
    const to = new Date(), from = new Date();
    from.setDate(from.getDate() - parseInt(days));
    $('date-from').value = from.toISOString().slice(0,10);
    $('date-to').value = to.toISOString().slice(0,10);
  });
});

// ----- Type checkboxes -----
document.querySelectorAll('#type-group input').forEach(cb => {
  cb.addEventListener('change', () => { if (cb.checked) currentTypes.add(cb.value); else currentTypes.delete(cb.value); });
});
function syncTypes() { document.querySelectorAll('#type-group input').forEach(cb => { cb.checked = currentTypes.has(cb.value); }); }
$('type-all').addEventListener('click', () => { document.querySelectorAll('#type-group input').forEach(cb => { cb.checked=true; currentTypes.add(cb.value); }); });
$('type-none').addEventListener('click', () => { document.querySelectorAll('#type-group input').forEach(cb => { cb.checked=false; }); currentTypes = new Set(); });
$('type-reset').addEventListener('click', () => { currentTypes = new Set(['tender','award']); syncTypes(); });

// ----- Settings persistence -----
function saveSettings() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({
    query: $('query').value, include: $('include').value, exclude: $('exclude').value,
    unit: $('unit').value, types: Array.from(currentTypes), pages: $('pages').value,
    dateFrom: $('date-from').value, dateTo: $('date-to').value,
  })); } catch(e) {}
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (s.query !== undefined) $('query').value = s.query;
    if (s.include !== undefined) $('include').value = s.include;
    if (s.exclude !== undefined) $('exclude').value = s.exclude;
    if (s.unit !== undefined) $('unit').value = s.unit;
    if (s.pages) $('pages').value = s.pages;
    if (s.dateFrom !== undefined) $('date-from').value = s.dateFrom;
    if (s.dateTo !== undefined) $('date-to').value = s.dateTo;
    if (Array.isArray(s.types)) { currentTypes = new Set(s.types); syncTypes(); }
  } catch(e) {}
}

// ----- API fetch -----
async function fetchPage(query, page) {
  const url = `${API}?query=${encodeURIComponent(query)}&page=${page}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API HTTP ' + res.status);
  return await res.json();
}

// ----- Search -----
async function search() {
  const query = $('query').value.trim();
  if (!query) { toast('請先填寫主要關鍵字'); return; }
  const include = parseList($('include').value);
  const exclude = parseList($('exclude').value);
  const unit = $('unit').value.trim();
  const pages = parseInt($('pages').value);
  const fromRaw = ($('date-from').value || '').replace(/-/g, '');
  const toRaw = ($('date-to').value || '').replace(/-/g, '');

  $('btn-search').disabled = true;
  $('btn-search').textContent = '搜尋中…';
  $('topbar-meta').innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:-3px;"></span> 抓取資料中';
  $('result-body').innerHTML = '<div class="state"><span class="spinner"></span><div style="margin-top:14px;font-size:13px;color:var(--text-soft);">正在從 g0v 開放資料庫抓取...</div></div>';
  saveSettings();

  const searchId = ++window._searchId;

  function filterAndMap(records) {
    return records.filter(rec => {
      const b = rec.brief || {};
      const title = b.title || rec.title || '';
      const uName = rec.unit_name || b.unit_name || '';
      const tk = classifyType(b.type || '');
      const d = String(rec.date || '');
      if (currentTypes.size === 0) return false;
      if (!currentTypes.has(tk)) return false;
      for (const w of include) if (title.indexOf(w) === -1) return false;
      for (const w of exclude) if (title.indexOf(w) !== -1) return false;
      if (unit && uName.indexOf(unit) === -1) return false;
      if (fromRaw && d && d < fromRaw) return false;
      if (toRaw && d && d > toRaw) return false;
      return true;
    }).map(rec => {
      const b = rec.brief || {};
      const tk = classifyType(b.type || '');
      const fn = rec.filename || '';
      let pccUrl = '';
      if (fn && rec.date) pccUrl = `https://web.pcc.gov.tw/prkms/tender/common/noticeDate/redirectPublic?ds=${rec.date}&fn=${encodeURIComponent(fn)}.xml`;
      return {
        title: b.title || rec.title || '(無標題)',
        unit: rec.unit_name || b.unit_name || '',
        date: String(rec.date || ''),
        type: tk, typeLabel: typeLabels[tk] || '公告',
        amount: getAmount(rec),
        url: pccUrl || `https://openfunltd.github.io/pcc-viewer/tender.html?unit_id=${encodeURIComponent(rec.unit_id||'')}&job_number=${encodeURIComponent(rec.job_number||'')}`,
        altUrl: `https://openfunltd.github.io/pcc-viewer/tender.html?unit_id=${encodeURIComponent(rec.unit_id||'')}&job_number=${encodeURIComponent(rec.job_number||'')}`,
        hasPccUrl: !!pccUrl,
        unitId: rec.unit_id || '',
        jobNo: rec.job_number || '',
      };
    });
  }

  let allRaw = [], failed = false;
  for (let p = 1; p <= pages; p++) {
    if (window._searchId !== searchId) return;
    $('topbar-meta').innerHTML = `<span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:-3px;"></span> 第 ${p}/${pages} 頁`;
    try {
      const data = await fetchPage(query, p);
      const records = data.records || [];
      if (records.length === 0) break;
      allRaw = allRaw.concat(records);
    } catch (e) {
      if (p === 1) {
        $('result-body').innerHTML = `<div class="state"><div class="state-icon">!</div><div class="state-title">抓取失敗</div><div class="state-desc">${e.message}<br>可能是網路斷線、API 暫時忙線或被防火牆擋住。</div></div>`;
        $('btn-search').disabled = false; $('btn-search').textContent = '開始搜尋'; $('topbar-meta').textContent = 'Error'; return;
      }
      failed = true; break;
    }
    if (window._searchId !== searchId) return;
    currentResults = filterAndMap(allRaw);
    renderResults();
    $('btn-export').disabled = currentResults.length === 0;
    if (p === 1) { $('btn-search').disabled = false; $('btn-search').textContent = '開始搜尋'; }
  }
  if (window._searchId !== searchId) return;
  currentResults = filterAndMap(allRaw);
  renderResults();
  $('btn-export').disabled = currentResults.length === 0;
  $('topbar-meta').textContent = `抓取 ${allRaw.length} 筆 / 篩出 ${currentResults.length} 筆 · 完成${failed ? '（部分失敗）' : ''}`;
}

// ----- Render -----
let _metaAbort = 0;

function renderResults() {
  _metaAbort++;
  const myAbort = _metaAbort;

  const sort = $('sort').value;
  const sorted = [...currentResults].sort((a, b) => {
    if (sort === 'date-desc') return (b.date||'').localeCompare(a.date||'');
    if (sort === 'date-asc') return (a.date||'').localeCompare(b.date||'');
    if (sort === 'amount-desc') return b.amount - a.amount;
    if (sort === 'amount-asc') return a.amount - b.amount;
    return 0;
  });

  // Group same-title
  const grouped = [], groupMap = {};
  for (const r of sorted) {
    const key = (r.title||'').trim() + '||' + (r.unit||'');
    if (groupMap[key] != null) grouped[groupMap[key]].siblings.push(r);
    else { groupMap[key] = grouped.length; grouped.push({...r, siblings:[]}); }
  }

  window._sortedResults = grouped;
  const total = grouped.length, totalRaw = sorted.length;
  $('s-total').textContent = total.toLocaleString();
  $('s-tender').textContent = sorted.filter(r=>r.type==='tender').length.toLocaleString();
  $('s-award').textContent = sorted.filter(r=>r.type==='award').length.toLocaleString();
  $('s-amount').innerHTML = fmtTotalAmount(sorted.reduce((s,r)=>s+r.amount,0));
  $('result-head-title').textContent = totalRaw > total ? `結果列表 · ${total} 筆（已合併 ${totalRaw-total} 筆同名）` : `結果列表 · ${total} 筆`;

  const body = $('result-body');
  body.innerHTML = '';

  if (grouped.length === 0) {
    body.innerHTML = '<div class="state"><div class="state-icon">∅</div><div class="state-title">沒有符合的標案</div><div class="state-desc">試試減少關鍵字、清空機關名稱或調大抓取頁數。</div></div>';
    return;
  }

  // Batch render 10 at a time
  let cursor = 0;
  const BATCH = 10;

  function renderBatch() {
    if (_metaAbort !== myAbort) return; // aborted
    const end = Math.min(cursor + BATCH, grouped.length);
    const frag = document.createDocumentFragment();
    for (let i = cursor; i < end; i++) {
      const r = grouped[i];
      const sibCount = (r.siblings||[]).length;
      const card = document.createElement('div');
      card.className = 'tender-card';
      card.innerHTML = `
        <div class="tender-card-main" onclick="openDetail(${i})">
          <div class="tender-card-top">
            <span class="tag tag-${r.type}">${r.typeLabel}</span>
            <span class="tender-date">${fmtDate(r.date)}</span>
            ${r.amount > 0 ? `<span class="tender-amount">${fmtMoney(r.amount)}</span>` : ''}
            ${sibCount > 0 ? `<span class="sib-badge">↻ 重招 ${sibCount} 次</span>` : ''}
          </div>
          <div class="tender-title">${escHtml(r.title)}</div>
          <div class="tender-unit">${escHtml(r.unit) || '(機關未填)'}</div>
          <div class="tender-meta" id="meta-${i}"><span class="meta-na">載入中…</span></div>
        </div>
        ${sibCount > 0 ? `<div class="tender-sib-bar"><button onclick="toggleSiblings(${i},event)">↻ 展開歷次招標 (${sibCount+1} 筆) ▾</button></div>` : ''}
        <div class="tender-siblings" id="sib-${i}" style="display:none;"></div>
      `;
      frag.appendChild(card);
    }
    body.appendChild(frag);

    // Fetch meta for this batch
    fetchMetaBatch(grouped, cursor, end, myAbort);

    cursor = end;
    if (cursor < grouped.length) requestAnimationFrame(renderBatch);
  }
  renderBatch();
}

// ----- Meta fetching (截標/開標/金額) -----
const detailCache = {};

function updateCacheBadge() {
  const n = Object.keys(detailCache).length;
  const el = $('cache-badge');
  if (n > 0) { el.style.display = 'block'; $('cache-count').textContent = n; }
  else el.style.display = 'none';
}

async function fetchMetaBatch(grouped, start, end, abortId) {
  let failures = 0;
  for (let i = start; i < end; i++) {
    if (_metaAbort !== abortId) return;
    const r = grouped[i];
    const el = $('meta-' + i);
    if (!el) continue;
    if (!r.unitId || !r.jobNo) { el.innerHTML = '<span class="meta-na">—</span>'; continue; }
    const ck = r.unitId + '|' + r.jobNo;
    if (detailCache[ck]) { renderMeta(el, detailCache[ck]); continue; }
    if (failures >= 3) { el.innerHTML = '<span class="meta-na">— 暫停</span>'; continue; }
    try {
      const res = await fetch(`https://pcc-api.openfun.app/api/tender?unit_id=${encodeURIComponent(r.unitId)}&job_number=${encodeURIComponent(r.jobNo)}`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      detailCache[ck] = data;
      updateCacheBadge();
      renderMeta(el, data);
      failures = 0;
    } catch(e) { failures++; el.innerHTML = '<span class="meta-na">— 失敗</span>'; }
    await new Promise(r => setTimeout(r, 150 + Math.random()*150));
  }
}

function extractMeta(data) {
  const recs = data.records || [];
  if (!recs.length) return {};
  const latest = [...recs].sort((a,b) => String(b.date).localeCompare(String(a.date)))[0];
  const d = latest.detail || {};
  let deadline='', openTime='', amount='';
  const tryAmt = ['預算金額','公告金額','總決標金額','決標金額'];
  for (const k of Object.keys(d)) {
    const v = d[k]; if (!v) continue;
    if (k.indexOf('截止投標')!==-1 || k.indexOf('截標時間')!==-1) deadline = String(v);
    else if (k.indexOf('開標時間')!==-1) openTime = String(v);
  }
  for (const target of tryAmt) {
    for (const k of Object.keys(d)) {
      if ((k.endsWith(target) || k.endsWith(':'+target)) && k.indexOf('是否')===-1 && looksLikeAmount(d[k])) { amount = String(d[k]); break; }
    }
    if (amount) break;
  }
  return { deadline: fmtTimeStr(deadline), openTime: fmtTimeStr(openTime), amount };
}

function renderMeta(el, data) {
  const m = extractMeta(data);
  const items = [];
  if (m.deadline) { const u = isUrgent(m.deadline); items.push(`<span class="meta-item"><span class="meta-label">截標</span><span class="meta-val${u?' urgent':''}">${escHtml(m.deadline)}</span></span>`); }
  if (m.openTime) { const u = isUrgent(m.openTime); items.push(`<span class="meta-item"><span class="meta-label">開標</span><span class="meta-val${u?' urgent':''}">${escHtml(m.openTime)}</span></span>`); }
  if (m.amount) items.push(`<span class="meta-item"><span class="meta-label">公告金額</span><span class="meta-val">${escHtml(m.amount)}</span></span>`);
  el.innerHTML = items.length ? items.join('') : '<span class="meta-na">— 無時程資訊</span>';
}

// ----- Detail panel -----
function openDetail(idx) {
  const r = (window._sortedResults||[])[idx];
  if (!r) return;
  const panel = $('detail-panel'), overlay = $('detail-overlay'), head = $('detail-head-info'), body = $('detail-body');
  head.innerHTML = `
    <div class="detail-eyebrow"><span class="tag tag-${r.type}">${r.typeLabel}</span> <span>${fmtDate(r.date)}</span> ${r.amount>0?'<span>· '+fmtMoney(r.amount)+'</span>':''}</div>
    <div class="detail-title">${escHtml(r.title)}</div>
    <div class="detail-unit">${escHtml(r.unit)||'(機關未填)'}</div>
  `;
  panel.classList.add('show'); overlay.classList.add('show');
  const ck = r.unitId+'|'+r.jobNo;
  if (detailCache[ck]) { renderDetail(body, detailCache[ck], r); return; }
  body.innerHTML = '<div class="state"><span class="spinner"></span><div style="margin-top:14px;font-size:13px;color:var(--text-soft);">載入詳情…</div></div>';
  (async()=>{
    try {
      const res = await fetch(`https://pcc-api.openfun.app/api/tender?unit_id=${encodeURIComponent(r.unitId)}&job_number=${encodeURIComponent(r.jobNo)}`);
      if (!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      detailCache[ck] = data; updateCacheBadge();
      renderDetail(body, data, r);
    } catch(e) { body.innerHTML = `<div class="state" style="color:var(--accent);">載入失敗: ${escHtml(e.message)}<br><a href="${r.url}" target="_blank" style="color:var(--accent);">改用採購網查看 →</a></div>`; }
  })();
}

function closeDetail() {
  $('detail-panel').classList.remove('show');
  $('detail-overlay').classList.remove('show');
}
$('detail-close').addEventListener('click', closeDetail);
$('detail-overlay').addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// White-list fields
const WL = {
  '🏆 決標資訊': ['決標廠商','廠商名稱','廠商代碼','統一編號','決標金額','預算金額','底價金額','底價','總決標金額','決標日期','決標方式'],
  '📋 招標資訊': ['標案案號','標案名稱','採購名稱','採購類別','標的分類','招標方式','採購方式','決標方式','機關名稱','單位名稱','採購單位','機關地址','聯絡人','聯絡電話','傳真號碼','電子郵件信箱','公告日期','截止投標','截止收件','截標時間','開標時間','開標日期','預算或預估','公告金額'],
  '💰 押標金與保證金': ['押標金','押標金金額','保證金','保證金金額','履約保證金','保固保證金','招標文件售價','招標文件費'],
  '📝 資格與說明': ['廠商資格','投標資格','基本資格','附加說明','附註'],
};

function renderDetail(body, data, mainR) {
  const recs = data.records || [];
  if (!recs.length) { body.innerHTML = '<div class="state">查無資料</div>'; return; }
  const sorted = [...recs].sort((a,b) => String(b.date).localeCompare(String(a.date)));
  const latest = sorted[0], detail = latest.detail || {};

  // Hero
  const meta = extractMeta(data);
  let html = '';
  if (meta.deadline || meta.openTime || meta.amount) {
    let items = '';
    if (meta.deadline) { const u=isUrgent(meta.deadline); items += `<div class="hero-item${u?' urgent':''}"><div class="hero-label">截止投標</div><div class="hero-value">${escHtml(meta.deadline)}</div></div>`; }
    if (meta.openTime) { const u=isUrgent(meta.openTime); items += `<div class="hero-item${u?' urgent':''}"><div class="hero-label">開標時間</div><div class="hero-value">${escHtml(meta.openTime)}</div></div>`; }
    if (meta.amount) items += `<div class="hero-item"><div class="hero-label">公告金額</div><div class="hero-value">${escHtml(meta.amount)}</div></div>`;
    html += `<div class="detail-hero">${items}</div>`;
  }

  // Timeline (collapsible)
  if (recs.length > 1) {
    window._tlRecs = sorted; window._tlMainR = mainR;
    let tlHtml = sorted.map((rec, idx) => {
      const b = rec.brief||{}, t = b.type||'公告', tk = classifyType(t);
      const colors = {tender:'var(--tender)',award:'var(--award)',rental:'var(--rental)',sell:'var(--sell)',amend:'var(--amend)',other:'var(--other)'};
      const amt = extractAmount(rec, b), amtStr = amt>0 ? fmtMoney(amt) : '';
      const cos = extractCompanies(rec, b);
      const coStr = cos.length ? `<div class="tl-co">得標:${escHtml(cos.length<=2?cos.join('、'):cos.slice(0,2).join('、')+' 等'+cos.length+'家')}</div>` : '';
      return `<div class="tl-item">
        <button type="button" class="tl-row${idx===0?' tl-latest':''}" onclick="toggleTlItem(${idx},this)">
          <div class="tl-dot" style="background:${colors[tk]||'var(--text-faint)'}"></div>
          <div><div style="display:flex;gap:8px;align-items:center"><span class="tl-type">${escHtml(t)}</span>${idx===0?'<span class="tl-tag-latest">最新</span>':''}</div>
            <div class="tl-meta"><span class="tl-date">${fmtDate(String(rec.date))}</span>${amtStr?`<span class="tl-amt">${amtStr}</span>`:''}</div>${coStr}</div>
          <div class="tl-arrow">展開 ▾</div>
        </button>
        <div class="tl-expand" id="tl-exp-${idx}" style="display:none;"></div>
      </div>`;
    }).join('');
    html += `<section class="detail-section detail-tl">
      <button type="button" class="tl-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none';this.querySelector('.tl-toggle-arrow').textContent=this.nextElementSibling.style.display==='none'?'▾':'▴'">
        🗂 本案所有公告 · ${recs.length} 筆 <span class="tl-toggle-arrow">▾</span>
      </button>
      <div class="tl-list" style="display:none;flex-direction:column;">${tlHtml}</div>
    </section>`;
  }

  // Sections from white-list
  const sections = {};
  for (const sec of Object.keys(WL)) sections[sec] = [];
  for (const k of Object.keys(detail)) {
    const v = detail[k]; if (v==null||v==='') continue;
    if (k==='type'||k==='url'||k==='pkPmsMain') continue;
    const ci = k.indexOf(':');
    const label = ci>0 ? k.substring(ci+1) : k;
    if (label.indexOf('是否')!==-1) continue;
    for (const sec of Object.keys(WL)) {
      if (WL[sec].some(kw => label.indexOf(kw)!==-1)) { sections[sec].push({label,value:String(v)}); break; }
    }
  }
  for (const sec of Object.keys(sections)) {
    const items = sections[sec]; if (!items.length) continue;
    html += `<section class="detail-section"><div class="detail-sec-title">${sec}</div><div class="detail-grid">`;
    for (const it of items) {
      const isLong = it.label.length>10 || it.value.length>100;
      let cls = '';
      if (it.label.indexOf('金額')!==-1||it.label.indexOf('底價')!==-1) cls='amt';
      else if (it.label.indexOf('廠商')!==-1) cls='co';
      else if (it.label.indexOf('時間')!==-1||it.label.indexOf('日期')!==-1) cls='tm';
      html += `<div class="d-row${isLong?' long':''}"><dt>${escHtml(it.label)}</dt><dd class="${cls}">${escHtml(cleanText(it.value))}</dd></div>`;
    }
    html += '</div></section>';
  }

  html += `<div class="detail-actions">
    <a href="${mainR.url}" target="_blank" class="act-primary">採購網原始公告 →</a>
    <a href="${mainR.altUrl}" target="_blank" class="act-secondary">g0v 整理頁 →</a>
  </div>`;
  body.innerHTML = html;
}

// Timeline item expand/collapse
function toggleTlItem(idx, btn) {
  const el = $('tl-exp-' + idx);
  if (!el) return;
  const arrow = btn.querySelector('.tl-arrow');
  if (el.style.display !== 'none') { el.style.display='none'; if(arrow)arrow.textContent='展開 ▾'; return; }
  if (el.dataset.loaded) { el.style.display='block'; if(arrow)arrow.textContent='收合 ▴'; return; }
  const rec = (window._tlRecs||[])[idx];
  if (!rec) return;
  const d = rec.detail || {};
  let rows = '';
  for (const k of Object.keys(d)) {
    const v = d[k]; if (v==null||v==='') continue;
    if (k==='type'||k==='url'||k==='pkPmsMain') continue;
    const ci = k.indexOf(':');
    const label = ci>0?k.substring(ci+1):k;
    if (label.indexOf('是否')!==-1) continue;
    let matched = false;
    for (const sec of Object.keys(WL)) { if (WL[sec].some(kw=>label.indexOf(kw)!==-1)){matched=true;break;} }
    if (!matched) continue;
    const isLong = label.length>10||String(v).length>80;
    rows += `<div class="tl-d-row${isLong?' long':''}"><span class="tl-d-label">${escHtml(label)}</span><span class="tl-d-value">${escHtml(cleanText(String(v)))}</span></div>`;
  }
  el.innerHTML = rows || '<div style="padding:8px;font-size:12px;color:var(--text-faint);">無重要欄位</div>';
  el.style.display = 'block'; el.dataset.loaded = 'true';
  if (arrow) arrow.textContent = '收合 ▴';
}

// ----- Siblings -----
function toggleSiblings(idx, ev) {
  ev.stopPropagation();
  const r = (window._sortedResults||[])[idx];
  if (!r) return;
  const box = $('sib-'+idx), btn = ev.currentTarget;
  if (!box) return;
  if (box.style.display !== 'none') { box.style.display='none'; btn.textContent=`↻ 展開歷次招標 (${r.siblings.length+1} 筆) ▾`; return; }
  box.style.display = 'block';
  btn.textContent = '收起 ▴';
  window._currentSiblings = [r, ...r.siblings].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  box.innerHTML = `<div class="sib-header">同標題歷次招標（依日期由新到舊）</div>` +
    window._currentSiblings.map((s, ii) => `
      <button type="button" class="sib-row${ii===0?' sib-row-main':''}" onclick="openSibDetail(${ii})">
        <span class="tag tag-${s.type}" style="font-size:9px;padding:2px 6px;">${s.typeLabel}</span>
        <span class="sib-date">${fmtDate(s.date)}</span>
        <span style="flex:1">${escHtml(s.jobNo||'')}</span>
        <span class="sib-amount">${s.amount>0?fmtMoney(s.amount):''}</span>
        <span class="sib-arrow">詳情 →</span>
      </button>
    `).join('');
}

function openSibDetail(sibIdx) {
  const s = (window._currentSiblings||[])[sibIdx];
  if (!s) return;
  // Create a temporary "sorted result" entry and open detail
  const tmpIdx = window._sortedResults.length;
  window._sortedResults.push(s);
  openDetail(tmpIdx);
}

// ----- CSV Export -----
function exportCSV() {
  if (!currentResults.length) return;
  const h = ['類型','公告日期','標案名稱','機關','金額','連結'];
  const lines = [h.join(',')];
  for (const r of currentResults) {
    lines.push([r.typeLabel, fmtDate(r.date), r.title, r.unit, r.amount||'', r.url].map(v => {
      const s = String(v==null?'':v);
      return s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf('\n')!==-1 ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(','));
  }
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '標案探勘_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 已下載');
}

function reset() {
  $('query').value = '資訊'; $('include').value = ''; $('exclude').value = '維護, 保養';
  $('unit').value = ''; $('pages').value = '3'; $('date-from').value = ''; $('date-to').value = '';
  document.querySelectorAll('#date-quick button').forEach(b => b.classList.remove('active'));
  currentTypes = new Set(['tender','award']); syncTypes(); saveSettings(); toast('已重置');
}

// ----- Wire up -----
$('btn-search').addEventListener('click', search);
$('btn-export').addEventListener('click', exportCSV);
$('btn-reset').addEventListener('click', reset);
$('sort').addEventListener('change', () => renderResults());
document.querySelectorAll('.sb-input').forEach(el => { el.addEventListener('keydown', e => { if (e.key === 'Enter') search(); }); });

loadSettings();
</script>
</body>
</html>
