<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>標案探勘 · Tender Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --surface-soft: #f4f3ee;
  --border: #e8e6df;
  --border-strong: #c9c5b8;
  --text: #1c1c1a;
  --text-soft: #5a5852;
  --text-faint: #8e8b80;
  --accent: #b91c1c;
  --accent-soft: #fef2f2;
  --tender: #1e40af;
  --tender-soft: #eff6ff;
  --award: #166534;
  --award-soft: #f0fdf4;
  --rental: #92400e;
  --rental-soft: #fef3c7;
  --sell: #155e75;
  --sell-soft: #ecfeff;
  --amend: #7c3aed;
  --amend-soft: #f5f3ff;
  --other: #525252;
  --other-soft: #f5f5f4;
  --shadow-sm: 0 1px 2px rgba(28, 28, 26, 0.04);
  --shadow: 0 1px 3px rgba(28, 28, 26, 0.06), 0 4px 16px rgba(28, 28, 26, 0.04);
  --radius: 6px;
  --radius-sm: 4px;
  --serif: 'Noto Serif TC', 'Source Han Serif TC', 'PMingLiU', serif;
  --sans: 'Noto Sans TC', -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ============ Top Bar ============ */
.topbar {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  padding: 18px 32px;
  display: flex;
  align-items: baseline;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
  background: rgba(255, 255, 255, 0.92);
}
.brand {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.01em;
}
.brand .dot {
  color: var(--accent);
  font-family: var(--sans);
}
.brand-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-left: 4px;
}
.topbar-meta {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-faint);
  font-family: var(--mono);
}

/* ============ Layout ============ */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: calc(100vh - 60px);
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 24px;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}

.main {
  padding: 28px 32px 64px;
  max-width: 1200px;
}

/* ============ Sidebar Form ============ */
.sb-section {
  margin-bottom: 28px;
}
.sb-label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 8px;
}
.sb-hint {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 6px;
  line-height: 1.5;
}
.sb-input, .sb-select {
  width: 100%;
  padding: 9px 11px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  transition: all 0.15s ease;
}
.sb-input:focus, .sb-select:focus {
  outline: none;
  border-color: var(--text);
  background: var(--surface);
}
.sb-input::placeholder { color: var(--text-faint); }

.sb-radio-group {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg);
}
.sb-radio-group label {
  flex: 1;
  text-align: center;
  padding: 8px 6px;
  font-size: 13px;
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: all 0.15s ease;
  color: var(--text-soft);
}
.sb-radio-group label:last-child { border-right: none; }
.sb-radio-group input { display: none; }
.sb-radio-group input:checked + label,
.sb-radio-group label.checked {
  background: var(--text);
  color: var(--surface);
  font-weight: 500;
}

.btn-search {
  width: 100%;
  padding: 12px;
  background: var(--text);
  color: var(--surface);
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.15s ease;
  margin-top: 8px;
}
.btn-search:hover { background: #000; transform: translateY(-1px); }
.btn-search:active { transform: translateY(0); }
.btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-reset {
  width: 100%;
  padding: 9px;
  background: transparent;
  color: var(--text-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.15s ease;
}
.btn-reset:hover { background: var(--surface-soft); color: var(--text); }

.date-quick {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}
.date-quick button {
  padding: 6px 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.15s ease;
}
.date-quick button:hover { background: var(--surface-soft); color: var(--text); border-color: var(--border-strong); }
.date-quick button.active {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
  font-weight: 500;
}
.date-range {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 6px;
  align-items: center;
}
.date-range .sb-input {
  font-size: 12px;
  padding: 7px 8px;
  font-family: var(--mono);
}
.date-sep {
  font-size: 11px;
  color: var(--text-faint);
}

/* ============ Main Content ============ */
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.page-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.page-title .accent { color: var(--accent); }
.page-sub {
  font-size: 13px;
  color: var(--text-soft);
  margin-top: 4px;
}
.page-actions {
  display: flex;
  gap: 8px;
}
.btn-ghost {
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn-ghost:hover { background: var(--surface-soft); border-color: var(--border-strong); }
.btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============ Stats Cards ============ */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.01em;
}
.stat-value .unit {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text-faint);
  margin-left: 4px;
  font-weight: 400;
}
.stat.accent { background: var(--accent-soft); border-color: #fecaca; }
.stat.accent .stat-value { color: var(--accent); }

/* ============ Results ============ */
.results {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.result-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-soft);
}
.result-head-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.result-sort {
  font-size: 12px;
  color: var(--text-soft);
}
.result-sort select {
  border: none;
  background: transparent;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  font-weight: 500;
}

.tender-card {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s ease;
  position: relative;
}
.tender-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: transparent;
  transition: background 0.12s ease;
}
.tender-card:hover { background: var(--surface-soft); }
.tender-card:hover::before { background: var(--accent); }
.tender-card:last-child { border-bottom: none; }
.tender-card-main {
  padding: 18px 22px 14px;
  cursor: pointer;
}
.tender-card-links {
  padding: 0 22px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.tender-card-links a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.tender-card-links a:hover { text-decoration: underline; }
.tender-card-links a.link-soft { color: var(--text-faint); font-weight: 400; }
.tender-card-links .link-sep { color: var(--border-strong); }

.btn-history {
  background: none;
  border: none;
  padding: 0;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text-soft);
  cursor: pointer;
  font-weight: 500;
}
.btn-history:hover { color: var(--text); }

.tender-sib-bar {
  padding: 0 22px 14px;
  margin-top: -4px;
}
.tender-sib-bar .btn-history {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: #fef3c7;
  color: #78350f;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: all 0.12s ease;
}
.tender-sib-bar .btn-history:hover {
  background: #fde68a;
  color: #422006;
}

.tender-history {
  margin: 0 20px 16px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}

.sib-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 3px;
  background: #fef3c7;
  color: #92400e;
  margin-left: auto;
  letter-spacing: 0.04em;
}

.tender-siblings {
  margin: 0 20px 12px;
  padding: 12px 14px;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
}
.sib-header {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92400e;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed #fde68a;
}
.sib-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sib-row {
  display: grid;
  grid-template-columns: 50px 90px 1fr 100px 70px;
  gap: 10px;
  align-items: center;
  padding: 8px 10px;
  font-size: 12px;
  text-decoration: none;
  color: var(--text);
  border-radius: 3px;
  background: transparent;
  transition: background 0.12s ease;
}
.sib-row:hover { background: rgba(254, 243, 199, 0.6); }
.sib-row-main {
  background: rgba(254, 243, 199, 0.4);
  font-weight: 500;
}
.sib-row-main::before {
  content: '最新';
  position: absolute;
  margin-left: -36px;
  font-size: 9px;
  color: #92400e;
  font-family: var(--mono);
  letter-spacing: 0.08em;
}
.sib-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}
.sib-jobno {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-soft);
}
.sib-amount {
  font-family: var(--mono);
  font-weight: 500;
  text-align: right;
}
.sib-link {
  color: var(--accent);
  font-weight: 500;
  text-align: right;
  font-size: 11px;
}

@media (max-width: 720px) {
  .sib-row {
    grid-template-columns: 50px 1fr;
    gap: 6px;
  }
  .sib-date, .sib-jobno, .sib-amount, .sib-link {
    grid-column: 2;
  }
  .sib-amount, .sib-link { text-align: left; }
  .sib-row-main::before { display: none; }
}
.history-loading {
  font-size: 13px;
  color: var(--text-soft);
  text-align: center;
  padding: 10px 0;
}
.history-header {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}
.history-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hist-row {
  display: grid;
  grid-template-columns: 16px 90px 130px 1fr 70px;
  gap: 10px;
  align-items: center;
  padding: 8px 6px;
  font-size: 13px;
  border-radius: 3px;
  text-decoration: none;
  color: inherit;
  transition: background 0.12s ease;
}
.hist-row:hover { background: var(--surface); }
.hist-row:hover .hist-link { color: var(--accent); }
.hist-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-left: 4px;
}
.hist-date {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-soft);
}
.hist-type {
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
}
.hist-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  color: var(--text-soft);
}
.hist-amount {
  font-family: var(--mono);
  font-weight: 500;
  color: var(--text);
}
.hist-company {
  color: var(--award);
  font-weight: 500;
}
.hist-link {
  text-align: right;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-soft);
  transition: color 0.12s ease;
}

@media (max-width: 720px) {
  .hist-row {
    grid-template-columns: 8px 1fr;
    gap: 6px;
  }
  .hist-date, .hist-type, .hist-meta, .hist-link {
    grid-column: 2;
  }
  .hist-link { text-align: left; }
}

.tender-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.tag {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 3px;
}
.tag-tender { background: var(--tender-soft); color: var(--tender); }
.tag-award { background: var(--award-soft); color: var(--award); }
.tag-rental { background: var(--rental-soft); color: var(--rental); }
.tag-sell { background: var(--sell-soft); color: var(--sell); }
.tag-amend { background: var(--amend-soft); color: var(--amend); }
.tag-other { background: var(--other-soft); color: var(--other); }

.type-checkboxes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.type-cb {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  cursor: pointer;
  transition: all 0.12s ease;
  font-size: 12px;
}
.type-cb:hover { background: var(--surface-soft); border-color: var(--border-strong); }
.type-cb input { margin: 0; cursor: pointer; accent-color: var(--text); }
.type-cb:has(input:checked) { background: var(--surface); border-color: var(--text); }
.type-cb-tag {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 3px;
}
.type-cb-tag.type-tender { background: var(--tender-soft); color: var(--tender); }
.type-cb-tag.type-award { background: var(--award-soft); color: var(--award); }
.type-cb-tag.type-rental { background: var(--rental-soft); color: var(--rental); }
.type-cb-tag.type-sell { background: var(--sell-soft); color: var(--sell); }
.type-cb-tag.type-amend { background: var(--amend-soft); color: var(--amend); }
.type-cb-tag.type-other { background: var(--other-soft); color: var(--other); }

.type-quick {
  display: flex;
  gap: 4px;
}
.type-quick button {
  flex: 1;
  padding: 5px 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.12s ease;
}
.type-quick button:hover { background: var(--surface-soft); color: var(--text); }

.tender-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
}
.tender-amount {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.tender-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  line-height: 1.45;
  margin-bottom: 6px;
  color: var(--text);
}
.tender-title:hover { color: var(--accent); }

.tender-unit {
  font-size: 13px;
  color: var(--text-soft);
}
.tender-unit::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 3px;
  background: var(--text-faint);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}

.tender-meta-row {
  margin-top: 10px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.meta-loading {
  color: var(--text-faint);
  font-size: 11px;
  font-style: italic;
}
.meta-na {
  color: var(--text-faint);
  font-size: 11px;
}
.meta-item {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
}
.meta-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-weight: 600;
}
.meta-value {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
}
.meta-value.urgent {
  color: var(--accent);
  font-weight: 700;
}
.meta-value.urgent::after {
  content: ' ⚠';
  font-family: var(--sans);
  font-size: 11px;
}
.meta-value.meta-amount {
  color: var(--award);
}

/* ============ Empty / Loading ============ */
.state {
  padding: 80px 20px;
  text-align: center;
}
.state-icon {
  font-family: var(--serif);
  font-size: 56px;
  font-weight: 600;
  color: var(--border-strong);
  margin-bottom: 16px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.state-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}
.state-desc {
  font-size: 13px;
  color: var(--text-soft);
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.7;
}

.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--surface);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;

/* ============ 詳情側邊面板 ============ */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(28, 28, 26, 0.32);
  backdrop-filter: blur(2px);

}
.detail-panel {

.detail-head {

}

}
.detail-head-title {

  font-size: 22px;
  font-weight: 600;
  line-height: 1.35;

}
.detail-head-sub {
  font-size: 13px;

  gap: 10px;

}

  font-weight: 500;

}
.detail-close {
  border: none;

  font-size: 16px;
  cursor: pointer;
  color: var(--text-soft);
  padding: 8px 12px;
  border-radius: 50%;
  transition: all 0.15s ease;
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  display: inline-flex;

}
.detail-close:hover {

}

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 28px 22px;
}
.detail-body::-webkit-scrollbar { width: 8px; }
.detail-body::-webkit-scrollbar-track { background: transparent; }
.detail-body::-webkit-scrollbar-thumb {

}

.detail-section {

.detail-section-title {

.detail-grid {

<body>

<header class="topbar">
  <div class="brand">標案探勘<span class="dot">.</span><span class="brand-sub">Tender Explorer</span></div>
  <div class="topbar-meta" id="topbar-meta">Ready</div>
</header>

<div class="app">

  <aside class="sidebar">

    <div class="sb-section">
      <label class="sb-label">主要關鍵字</label>
      <input type="text" class="sb-input" id="query" placeholder="例:資訊、採購、工程" value="資訊">
      <div class="sb-hint">向資料源查詢時用,建議寬鬆一點。</div>
    </div>

    <div class="sb-section">
      <label class="sb-label">必須包含的字 <span style="text-transform:none;letter-spacing:0;color:var(--text-faint);">(且)</span></label>
      <input type="text" class="sb-input" id="include" placeholder="多個用逗號分隔">
      <div class="sb-hint">標題必須「全部」包含,例:資訊, 系統</div>
    </div>

    <div class="sb-section">
      <label class="sb-label">排除的字 <span style="text-transform:none;letter-spacing:0;color:var(--text-faint);">(不要)</span></label>
      <input type="text" class="sb-input" id="exclude" placeholder="多個用逗號分隔" value="維護, 保養">
      <div class="sb-hint">標題出現任一個就排除。</div>
    </div>

    <div class="sb-section">
      <label class="sb-label">機關名稱</label>
      <input type="text" class="sb-input" id="unit" placeholder="例:臺中">
      <div class="sb-hint">政府用「臺」不是「台」。</div>
    </div>

    <div class="sb-section">
      <label class="sb-label">公告日期範圍</label>
      <div class="date-quick">
        <button type="button" data-days="7">7 天</button>
        <button type="button" data-days="30">30 天</button>
        <button type="button" data-days="90">90 天</button>
        <button type="button" data-days="0">全部</button>
      </div>
      <div class="date-range">
        <input type="date" class="sb-input" id="date-from">
        <span class="date-sep">到</span>
        <input type="date" class="sb-input" id="date-to">
      </div>
      <div class="sb-hint">留空代表不限。快速鈕會自動填入日期。</div>
    </div>

    <div class="sb-section">
      <label class="sb-label">公告類型 <span style="text-transform:none;letter-spacing:0;color:var(--text-faint);">(可複選)</span></label>
      <div class="type-checkboxes" id="type-group">
        <label class="type-cb"><input type="checkbox" value="tender" checked><span class="type-cb-tag type-tender">招標</span></label>
        <label class="type-cb"><input type="checkbox" value="award" checked><span class="type-cb-tag type-award">決標</span></label>
        <label class="type-cb"><input type="checkbox" value="rental"><span class="type-cb-tag type-rental">財物出租</span></label>
        <label class="type-cb"><input type="checkbox" value="sell"><span class="type-cb-tag type-sell">財物變賣</span></label>
        <label class="type-cb"><input type="checkbox" value="amend"><span class="type-cb-tag type-amend">更正</span></label>
        <label class="type-cb"><input type="checkbox" value="other"><span class="type-cb-tag type-other">其他</span></label>
      </div>
      <div class="type-quick">
        <button type="button" id="type-all">全選</button>
        <button type="button" id="type-none">全不選</button>
        <button type="button" id="type-reset">預設</button>
      </div>
    </div>

    <div class="sb-section">
      <label class="sb-label">抓取頁數</label>
      <select class="sb-select" id="pages">
        <option value="1">1 頁(約 100 筆)</option>
        <option value="2">2 頁</option>
        <option value="3" selected>3 頁(推薦)</option>
        <option value="5">5 頁</option>
        <option value="10">10 頁(較慢)</option>
      </select>
    </div>

    <button class="btn-search" id="btn-search">開始搜尋</button>
    <button class="btn-reset" id="btn-reset">重置條件</button>

  </aside>

  <main class="main">

    <div class="page-head">
      <div>
        <h1 class="page-title">政府標案<span class="accent">探勘</span></h1>
        <div class="page-sub">從 g0v 開放標案資料庫即時查詢,所有條件可組合篩選。</div>
      </div>
      <div class="page-actions">
        <button class="btn-ghost" id="btn-export" disabled>匯出 CSV</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">符合條件</div><div class="stat-value" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">招標公告</div><div class="stat-value" id="s-tender">—</div></div>
      <div class="stat"><div class="stat-label">決標公告</div><div class="stat-value" id="s-award">—</div></div>
      <div class="stat accent"><div class="stat-label">總金額</div><div class="stat-value" id="s-amount">—</div></div>
    </div>

    <div class="results">
      <div class="result-head">
        <div class="result-head-title" id="result-head-title">結果列表</div>
        <div class="result-sort">
          排序:
          <select id="sort">
            <option value="date-desc">日期新→舊</option>
            <option value="date-asc">日期舊→新</option>
            <option value="amount-desc">金額高→低</option>
            <option value="amount-asc">金額低→高</option>
          </select>
        </div>
      </div>
      <div id="result-body">
        <div class="state">
          <div class="state-icon">標</div>
          <div class="state-title">準備好開始了</div>
          <div class="state-desc">在左側填好你想找的條件,按「開始搜尋」。資料來自 g0v 開放標案 API,大約涵蓋近兩年公告。</div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<!-- 側邊面板:標案詳情 -->
<div class="detail-overlay" id="detail-overlay"></div>
<aside class="detail-panel" id="detail-panel" aria-hidden="true">
  <div class="detail-head">
    <div class="detail-head-info" id="detail-head-info"></div>
    <button class="detail-close" id="detail-close" aria-label="關閉">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</aside>

<!-- 載入計數徽章(角落顯示已快取的筆數) -->
<div class="cache-badge" id="cache-badge" style="display:none;">
  <span id="cache-badge-count">0</span> 筆詳情已載入
</div>

<script>
const API = 'https://pcc-api.openfun.app/api/searchbytitle';
const STORAGE_KEY = 'tender_explorer_v1';

const $ = id => document.getElementById(id);
let currentResults = [];
let currentTypes = new Set(['tender', 'award']); // 預設只勾招標+決標

// 依公告 type 字串分類成 typeKey
function classifyType(typeStr) {
  const t = typeStr || '';
  if (t.indexOf('更正') !== -1) return 'amend';
  if (t.indexOf('決標') !== -1 || t.indexOf('無法決標') !== -1 || t.indexOf('廢標') !== -1) return 'award';
  if (t.indexOf('財物出租') !== -1 || (t.indexOf('出租') !== -1 && t.indexOf('招標') === -1)) return 'rental';
  if (t.indexOf('財物變賣') !== -1 || t.indexOf('變賣') !== -1) return 'sell';
  if (t.indexOf('招標') !== -1 || t.indexOf('公開取得') !== -1 || t.indexOf('限制性') !== -1 || t.indexOf('議價') !== -1) return 'tender';
  return 'other';
}

// type-cb checkbox 變動時更新 currentTypes
document.querySelectorAll('#type-group input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    if (cb.checked) currentTypes.add(cb.value);
    else currentTypes.delete(cb.value);
    saveSettings();
  });
});

function syncTypeCheckboxes() {
  document.querySelectorAll('#type-group input[type="checkbox"]').forEach(cb => {
    cb.checked = currentTypes.has(cb.value);
  });
}

document.getElementById('type-all').addEventListener('click', () => {
  document.querySelectorAll('#type-group input[type="checkbox"]').forEach(cb => {
    cb.checked = true;
    currentTypes.add(cb.value);
  });
  saveSettings();
});
document.getElementById('type-none').addEventListener('click', () => {
  document.querySelectorAll('#type-group input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
  });
  currentTypes = new Set();
  saveSettings();
});
document.getElementById('type-reset').addEventListener('click', () => {
  currentTypes = new Set(['tender', 'award']);
  syncTypeCheckboxes();
  saveSettings();
});

// ----- Save/load settings -----
function saveSettings() {
  const s = {
    query: $('query').value,
    include: $('include').value,
    exclude: $('exclude').value,
    unit: $('unit').value,
    types: Array.from(currentTypes),
    pages: $('pages').value,
    dateFrom: $('date-from').value,
    dateTo: $('date-to').value,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (s.query !== undefined) $('query').value = s.query;
    if (s.include !== undefined) $('include').value = s.include;
    if (s.exclude !== undefined) $('exclude').value = s.exclude;
    if (s.unit !== undefined) $('unit').value = s.unit;
    if (s.pages) $('pages').value = s.pages;
    if (s.dateFrom !== undefined) $('date-from').value = s.dateFrom;
    if (s.dateTo !== undefined) $('date-to').value = s.dateTo;
    if (Array.isArray(s.types)) {
      currentTypes = new Set(s.types);
      syncTypeCheckboxes();
    } else if (s.type) {
      // 舊版單選 fallback
      if (s.type === 'all') currentTypes = new Set(['tender','award','rental','sell','amend','other']);
      else if (s.type === 'tender' || s.type === 'award') currentTypes = new Set([s.type]);
      syncTypeCheckboxes();
    }
  } catch (e) {}
}

// ----- Utils -----
function parseList(s) {
  return s.split(/[,,]/).map(x => x.trim()).filter(Boolean);
}
function fmtDate(raw) {
  raw = String(raw || '');
  if (raw.length === 8) return raw.substr(0,4) + '.' + raw.substr(4,2) + '.' + raw.substr(6,2);
  return raw;
}
function fmtMoney(n) {
  if (!n || isNaN(n)) return '';
  const num = Number(n);
  if (num >= 100000000) return 'NT$ ' + (num / 100000000).toFixed(2) + ' 億';
  if (num >= 10000) return 'NT$ ' + (num / 10000).toFixed(1) + ' 萬';
  return 'NT$ ' + num.toLocaleString();
}
function fmtTotalAmount(n) {
  if (!n || n === 0) return '0';
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '<span class="unit">億</span>';
  if (n >= 10000) return Math.round(n / 10000).toLocaleString() + '<span class="unit">萬</span>';
  return n.toLocaleString();
}
function getAmount(rec) {
  const brief = rec.brief || {};
  const companies = brief.companies || {};
  if (companies && companies.amount) return Number(companies.amount);
  if (brief.amount) return Number(brief.amount);
  return 0;
}

// ----- Toast -----
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

// ----- Fetch -----
async function fetchPage(query, page) {
  const url = `${API}?query=${encodeURIComponent(query)}&page=${page}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API ' + res.status);
  return await res.json();
}

async function search() {
  const query = $('query').value.trim();
  if (!query) { toast('請先填寫主要關鍵字'); return; }

  const include = parseList($('include').value);
  const exclude = parseList($('exclude').value);
  const unit = $('unit').value.trim();
  const pages = parseInt($('pages').value);
  const dateFrom = $('date-from').value;  // YYYY-MM-DD or ''
  const dateTo = $('date-to').value;

  $('btn-search').disabled = true;
  $('btn-search').textContent = '搜尋中…';
  $('topbar-meta').innerHTML = '<span class="spinner" style="vertical-align:-4px;"></span> 抓取資料中';
  $('result-body').innerHTML = `<div class="state"><span class="spinner"></span><div style="margin-top:14px;font-size:13px;color:var(--text-soft);">正在從 g0v 開放資料庫抓取...</div></div>`;

  saveSettings();

  let all = [];
  try {
    for (let p = 1; p <= pages; p++) {
      $('topbar-meta').innerHTML = `<span class="spinner" style="vertical-align:-4px;"></span> 第 ${p} / ${pages} 頁`;
      const data = await fetchPage(query, p);
      const records = data.records || [];
      if (records.length === 0) break;
      all = all.concat(records);
    }
  } catch (e) {
    $('result-body').innerHTML = `<div class="state"><div class="state-icon">!</div><div class="state-title">抓取失敗</div><div class="state-desc">${e.message}<br><br>可能原因:網路斷線、API 暫時忙線、或被防火牆擋住。請稍等幾分鐘再試。</div></div>`;
    $('btn-search').disabled = false;
    $('btn-search').textContent = '開始搜尋';
    $('topbar-meta').textContent = 'Error';
    return;
  }

  // Filter
  // 把 YYYY-MM-DD 轉成 YYYYMMDD 給比對用
  const fromRaw = dateFrom ? dateFrom.replace(/-/g, '') : '';
  const toRaw = dateTo ? dateTo.replace(/-/g, '') : '';

  const filtered = all.filter(rec => {
    const brief = rec.brief || {};
    const title = brief.title || rec.title || '';
    const unitName = rec.unit_name || brief.unit_name || '';
    const recType = brief.type || '';
    const typeKey = classifyType(recType);
    const dateRaw = String(rec.date || '');

    if (currentTypes.size === 0) return false; // 全不選 = 全不顯示
    if (!currentTypes.has(typeKey)) return false;
    for (const w of include) if (title.indexOf(w) === -1) return false;
    for (const w of exclude) if (title.indexOf(w) !== -1) return false;
    if (unit && unitName.indexOf(unit) === -1) return false;
    if (fromRaw && dateRaw && dateRaw < fromRaw) return false;
    if (toRaw && dateRaw && dateRaw > toRaw) return false;
    return true;
  });

  currentResults = filtered.map(rec => {
    const brief = rec.brief || {};
    const briefType = brief.type || '';
    const typeKey = classifyType(briefType);
    const amount = getAmount(rec);
    const jobNo = rec.job_number || '';
    const unitId = rec.unit_id || '';
    const filename = rec.filename || '';

    // 採購網「萬用直連 URL」— 所有 filename 前綴都適用
    // 格式:https://web.pcc.gov.tw/prkms/tender/common/noticeDate/redirectPublic?ds=YYYYMMDD&fn=FILENAME.xml
    let pccUrl = '';
    if (filename && rec.date) {
      pccUrl = `https://web.pcc.gov.tw/prkms/tender/common/noticeDate/redirectPublic?ds=${rec.date}&fn=${encodeURIComponent(filename)}.xml`;
    }

    // 類型標籤
    const typeLabels = {
      tender: '招標', award: '決標', rental: '出租',
      sell: '變賣', amend: '更正', other: '其他'
    };
    const typeLabel = typeLabels[typeKey] || '公告';

    return {
      title: brief.title || rec.title || '(無標題)',
      unit: rec.unit_name || brief.unit_name || '',
      date: String(rec.date || ''),
      type: typeKey,
      typeLabel: typeLabel,
      amount: amount,
      // 主連結:能拼採購網直連就用,否則 fallback 到 g0v viewer
      url: pccUrl || `https://openfunltd.github.io/pcc-viewer/tender.html?unit_id=${encodeURIComponent(unitId)}&job_number=${encodeURIComponent(jobNo)}`,
      // 副連結:總是指向 g0v viewer(資料整理頁,廠商、預算、聯絡人都有)
      altUrl: `https://openfunltd.github.io/pcc-viewer/tender.html?unit_id=${encodeURIComponent(unitId)}&job_number=${encodeURIComponent(jobNo)}`,
      hasPccUrl: !!pccUrl,
      // 給歷史功能用
      unitId: unitId,
      jobNo: jobNo,
    };
  });

  renderResults();
  $('btn-search').disabled = false;
  $('btn-search').textContent = '開始搜尋';
  $('btn-export').disabled = currentResults.length === 0;
  $('topbar-meta').textContent = `抓取 ${all.length} 筆 / 篩出 ${currentResults.length} 筆`;
}

// ----- Render -----
function renderResults() {
  const sort = $('sort').value;
  const sorted = [...currentResults].sort((a, b) => {
    if (sort === 'date-desc') return (b.date || '').localeCompare(a.date || '');
    if (sort === 'date-asc') return (a.date || '').localeCompare(b.date || '');
    if (sort === 'amount-desc') return b.amount - a.amount;
    if (sort === 'amount-asc') return a.amount - b.amount;
    return 0;
  });

  // 合併同標題的標案(同一機關 + 同標題視為「歷次重招」)
  // 群組 key:title + unit(因為不同機關偶有撞名)
  const grouped = [];
  const groupMap = {};
  for (const r of sorted) {
    const key = (r.title || '').trim() + '||' + (r.unit || '');
    if (groupMap[key] != null) {
      // 已有主筆 → 加入 siblings
      grouped[groupMap[key]].siblings.push(r);
    } else {
      // 第一筆 = 主筆(因為 sorted 已排序,date-desc 時這就是最新)
      groupMap[key] = grouped.length;
      grouped.push({ ...r, siblings: [] });
    }
  }

  const total = grouped.length;
  const totalRaw = sorted.length;
  const tenderCount = sorted.filter(r => r.type === 'tender').length;
  const awardCount = sorted.filter(r => r.type === 'award').length;
  const totalAmount = sorted.reduce((s, r) => s + r.amount, 0);

  // 暫存供歷史展開功能使用(用合併後的)
  window._sortedResults = grouped;

  $('s-total').textContent = total.toLocaleString();
  $('s-tender').textContent = tenderCount.toLocaleString();
  $('s-award').textContent = awardCount.toLocaleString();
  $('s-amount').innerHTML = fmtTotalAmount(totalAmount);

  // 標題顯示「合併 N 筆,原始 M 筆」
  if (totalRaw > total) {
    $('result-head-title').textContent = `結果列表 · ${total} 筆(已合併 ${totalRaw - total} 筆同名)`;
  } else {
    $('result-head-title').textContent = `結果列表 · ${total} 筆`;
  }

  const body = $('result-body');
  if (grouped.length === 0) {
    body.innerHTML = `<div class="state"><div class="state-icon">∅</div><div class="state-title">沒有符合的標案</div><div class="state-desc">試試這幾個方向:<br>1. 把「必須包含」減少一個關鍵字<br>2. 「機關名稱」清空試試<br>3. 主要關鍵字改寬一點(例如只輸入「資訊」)<br>4. 把「抓取頁數」調大</div></div>`;
    return;
  }

  body.innerHTML = grouped.map((r, i) => {
    const sibCount = (r.siblings || []).length;
    const sibBadge = sibCount > 0
      ? `<span class="sib-badge" title="同名標案歷次重招 ${sibCount} 次">↻ 重招 ${sibCount} 次</span>`
      : '';
    const sibBtn = sibCount > 0
      ? `<button class="btn-history" onclick="toggleSiblings(${i}, event)">↻ 展開歷次招標 (${sibCount + 1} 筆) ▾</button>`
      : '';

    return `
    <div class="tender-card" data-idx="${i}">
      <div class="tender-card-main" onclick="openDetail(${i}, event)">
        <div class="tender-card-top">
          <span class="tag tag-${r.type}">${r.typeLabel}</span>
          <span class="tender-date">${fmtDate(r.date)}</span>
          ${r.amount > 0 ? `<span class="tender-amount">${fmtMoney(r.amount)}</span>` : ''}
          ${sibBadge}
        </div>
        <div class="tender-title">${escapeHtml(r.title)}</div>
        <div class="tender-unit">${escapeHtml(r.unit) || '(機關未填)'}</div>
        <div class="tender-meta-row" id="meta-${i}">
          <span class="meta-loading">載入截標 / 開標 / 公告金額…</span>
        </div>
      </div>
      ${sibBtn ? `<div class="tender-sib-bar">${sibBtn}</div>` : ''}
      <div class="tender-siblings" id="siblings-${i}" style="display:none;"></div>
    </div>
  `;
  }).join('');

  // 自動背景抓截標/開標/金額(已有快取的會秒填)
  fetchMetaInBackground(grouped);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// ----- 背景抓截標/開標時間(每張卡片) -----
function fmtTimeStr(raw) {
  // 政府格式可能是 "115/05/21 09:30" 或 "11505210930"
  if (!raw) return '';
  raw = String(raw).trim();
  // 已含斜線就直接用
  if (raw.indexOf('/') !== -1) return raw;
  // 11505210930 → 115/05/21 09:30
  const m = raw.match(/^(\d{3})(\d{2})(\d{2})(\d{2})?(\d{2})?/);
  if (m) {
    let s = `${m[1]}/${m[2]}/${m[3]}`;
    if (m[4]) s += ' ' + m[4] + (m[5] ? ':' + m[5] : '');
    return s;
  }
  return raw;
}

// ----- 詳情側邊面板 -----
const detailCache = {};         // 快取已載入過的詳情
let metaBgFailures = 0;
const META_MAX_FAILURES = 3;

// 從 tender API 回傳資料抽出截標/開標/公告金額
function extractMetaFromTender(data) {
  const records = data.records || [];
  if (records.length === 0) return {};
  // 取最新一筆
  const sorted = [...records].sort((a, b) => String(b.date).localeCompare(String(a.date)));
  const latest = sorted[0];
  const detail = latest.detail || {};

  let deadline = '', openTime = '', announceAmount = '';

  // 判斷一個 detail 值是不是「真的金額」— 必須含至少 3 位以上的數字
  const looksLikeAmount = (v) => {
    if (!v) return false;
    const s = String(v);
    // 拒絕純「是 / 否 / 不公開」這類值
    if (/^[是否不公開無未填]+$/.test(s.trim())) return false;
    // 必須含 4+ 位連續數字(避免「是」「否」「1.2 公頃」這種誤判)
    const digits = (s.match(/\d/g) || []).join('');
    return digits.length >= 4;
  };

  // 截標
  for (const k of Object.keys(detail)) {
    const v = detail[k];
    if (!v) continue;
    if (k.indexOf('截止投標') !== -1 || k.indexOf('截標時間') !== -1) { deadline = String(v); break; }
  }
  // 開標
  for (const k of Object.keys(detail)) {
    const v = detail[k];
    if (!v) continue;
    if (k.indexOf('開標時間') !== -1) { openTime = String(v); break; }
  }
  // 公告金額(優先級:預算金額 > 公告金額 > 決標金額)
  // 嚴格排除「是否公開」「金額是否公開」「金額級距」等非數字欄位
  const tryKeys = ['預算金額', '公告金額', '總決標金額', '決標金額'];
  for (const target of tryKeys) {
    for (const k of Object.keys(detail)) {
      // 必須是 key 結尾為目標詞(避免「預算金額是否公開」)
      if (k.endsWith(target) || k === target || k.endsWith(':' + target)) {
        const v = detail[k];
        if (looksLikeAmount(v)) {
          announceAmount = String(v);
          break;
        }
      }
    }
    if (announceAmount) break;
  }

  return {
    deadline: fmtTimeStr(deadline),
    openTime: fmtTimeStr(openTime),
    announceAmount: announceAmount,
  };
}

function isUrgentTime(timeStr) {
  if (!timeStr) return false;
  const m = timeStr.match(/^(\d{3})\/(\d{2})\/(\d{2})/);
  if (!m) return false;
  const year = parseInt(m[1]) + 1911;
  const target = new Date(year, parseInt(m[2]) - 1, parseInt(m[3]));
  const now = new Date();
  const diffDays = (target - now) / 86400000;
  return diffDays >= 0 && diffDays <= 7;
}

function renderCardMeta(idx, meta) {
  const el = document.getElementById('meta-' + idx);
  if (!el) return;
  const items = [];
  if (meta.deadline) {
    const cls = isUrgentTime(meta.deadline) ? 'meta-value urgent' : 'meta-value';
    items.push(`<span class="meta-item"><span class="meta-label">截標</span><span class="${cls}">${escapeHtml(meta.deadline)}</span></span>`);
  }
  if (meta.openTime) {
    const cls = isUrgentTime(meta.openTime) ? 'meta-value urgent' : 'meta-value';
    items.push(`<span class="meta-item"><span class="meta-label">開標</span><span class="${cls}">${escapeHtml(meta.openTime)}</span></span>`);
  }
  if (meta.announceAmount) {
    items.push(`<span class="meta-item"><span class="meta-label">公告金額</span><span class="meta-value meta-amount">${escapeHtml(meta.announceAmount)}</span></span>`);
  }
  if (items.length === 0) {
    el.innerHTML = '<span class="meta-na">— 無時程或金額資訊</span>';
  } else {
    el.innerHTML = items.join('');
  }
}

async function fetchMetaInBackground(grouped) {
  metaBgFailures = 0;
  for (let i = 0; i < grouped.length; i++) {
    const r = grouped[i];
    const el = document.getElementById('meta-' + i);
    if (!el) continue; // 卡片可能已被新搜尋取代

    if (!r.unitId || !r.jobNo) {
      el.innerHTML = '<span class="meta-na">— 無 API 索引</span>';
      continue;
    }

    const cacheKey = r.unitId + '|' + r.jobNo;
    if (detailCache[cacheKey]) {
      renderCardMeta(i, extractMetaFromTender(detailCache[cacheKey]));
      continue;
    }

    if (metaBgFailures >= META_MAX_FAILURES) {
      el.innerHTML = '<span class="meta-na">— 暫停載入(請求過密,點卡片仍可查詳情)</span>';
      continue;
    }

    try {
      const url = `https://pcc-api.openfun.app/api/tender?unit_id=${encodeURIComponent(r.unitId)}&job_number=${encodeURIComponent(r.jobNo)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      detailCache[cacheKey] = data; // 連帶把詳情面板也快取了
      updateCacheBadge();
      renderCardMeta(i, extractMetaFromTender(data));
      metaBgFailures = 0;
    } catch (e) {
      metaBgFailures++;
      el.innerHTML = '<span class="meta-na">— 載入失敗</span>';
    }

    await new Promise(resolve => setTimeout(resolve, 150 + Math.random() * 150));
  }
}

function updateCacheBadge() {
  const n = Object.keys(detailCache).length;
  const el = document.getElementById('cache-badge');
  const cnt = document.getElementById('cache-badge-count');
  if (!el) return;
  if (n === 0) {
    el.style.display = 'none';
  } else {
    el.style.display = 'block';
    if (cnt) cnt.textContent = n;
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('show');
  document.getElementById('detail-overlay').classList.remove('show');
  document.getElementById('detail-panel').setAttribute('aria-hidden', 'true');
}

async function openDetail(idx, ev) {
  ev.stopPropagation();
  const r = (window._sortedResults || [])[idx];
  if (!r) return;
  const panel = document.getElementById('detail-panel');
  const overlay = document.getElementById('detail-overlay');
  const headInfo = document.getElementById('detail-head-info');
  const body = document.getElementById('detail-body');

  // 標題先顯示(用主卡資訊)
  headInfo.innerHTML = `
    <div class="detail-head-eyebrow">
      <span class="tag tag-${r.type}">${r.typeLabel}</span>
      <span>${fmtDate(r.date)}</span>
      ${r.amount > 0 ? `<span>· ${escapeHtml(fmtMoney(r.amount))}</span>` : ''}
    </div>
    <div class="detail-head-title">${escapeHtml(r.title)}</div>
    <div class="detail-head-sub">
      <span class="unit-name">${escapeHtml(r.unit) || '(機關未填)'}</span>
    </div>
  `;

  // 打開面板
  panel.classList.add('show');
  overlay.classList.add('show');
  panel.setAttribute('aria-hidden', 'false');

  const cacheKey = r.unitId + '|' + r.jobNo;
  if (detailCache[cacheKey]) {
    renderDetail(body, detailCache[cacheKey], r);
    return;
  }

  // 顯示載入中
  body.innerHTML = `
    <div class="detail-loading">
      <span class="spinner"></span>
      <div style="margin-top:14px;font-size:13px;">從 g0v 載入完整詳情…</div>
    </div>
  `;

  try {
    const url = `https://pcc-api.openfun.app/api/tender?unit_id=${encodeURIComponent(r.unitId)}&job_number=${encodeURIComponent(r.jobNo)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    detailCache[cacheKey] = data;
    updateCacheBadge();
    renderDetail(body, data, r);
  } catch (e) {
    body.innerHTML = `
      <div class="detail-error">
        載入失敗:${escapeHtml(e.message)}<br>
        可能是網路或 API 暫時忙線,稍後再試。<br>
        <a href="${r.url}" target="_blank" rel="noopener" style="display:inline-block;margin-top:12px;color:var(--accent);">改用採購網原始公告查看 →</a>
      </div>
    `;
  }
}

function renderDetail(body, data, mainR) {
  const records = data.records || [];
  if (records.length === 0) {
    body.innerHTML = '<div class="detail-error">查無詳細資料</div>';
    return;
  }

  // 取最新一筆當主要顯示資料
  const sorted = [...records].sort((a, b) => String(b.date).localeCompare(String(a.date)));
  const latest = sorted[0];
  const detail = latest.detail || {};

  // 抽出關鍵時間/金額做成 hero
  const meta = extractMetaFromTender(data);
  let heroHtml = '';
  if (meta.deadline || meta.openTime || meta.announceAmount) {
    const items = [];
    if (meta.deadline) {
      const urg = isUrgentTime(meta.deadline);
      items.push(`
        <div class="detail-hero-item${urg ? ' urgent' : ''}">
          <div class="detail-hero-label">截止投標</div>
          <div class="detail-hero-value">${escapeHtml(meta.deadline)}</div>
        </div>
      `);
    }
    if (meta.openTime) {
      const urg = isUrgentTime(meta.openTime);
      items.push(`
        <div class="detail-hero-item${urg ? ' urgent' : ''}">
          <div class="detail-hero-label">開標時間</div>
          <div class="detail-hero-value">${escapeHtml(meta.openTime)}</div>
        </div>
      `);
    }
    if (meta.announceAmount) {
      items.push(`
        <div class="detail-hero-item">
          <div class="detail-hero-label">公告金額</div>
          <div class="detail-hero-value">${escapeHtml(meta.announceAmount)}</div>
        </div>
      `);
    }
    if (items.length > 0) {
      heroHtml = `<div class="detail-hero">${items.join('')}</div>`;
    }
  }

  // 分組所需欄位
  const groups = {
    '機關資料': [],
    '採購資料': [],
    '招標資料': [],
    '決標資料': [],
    '其他資料': [],
  };

  for (const k of Object.keys(detail)) {
    const v = detail[k];
    if (v == null || v === '') continue;
    if (k === 'type' || k === 'url') continue;

    const colonIdx = k.indexOf(':');
    let prefix = '其他資料', label = k;
    if (colonIdx > 0) {
      const p = k.substring(0, colonIdx);
      label = k.substring(colonIdx + 1);
      if (groups[p] != null) prefix = p;
      else if (p.indexOf('機關') !== -1) prefix = '機關資料';
      else if (p.indexOf('採購') !== -1) prefix = '採購資料';
      else if (p.indexOf('招標') !== -1 || p.indexOf('投標') !== -1) prefix = '招標資料';
      else if (p.indexOf('決標') !== -1 || p.indexOf('得標') !== -1) prefix = '決標資料';
      else prefix = '其他資料';
    }

    groups[prefix].push({ label: label, value: String(v) });
  }

  const sectionIcons = {
    '機關資料': '🏛',
    '採購資料': '📋',
    '招標資料': '📝',
    '決標資料': '🏆',
    '其他資料': '📎',
  };

  let html = heroHtml;

  // 多筆公告提示
  if (records.length > 1) {
    html += `
      <div class="detail-multi-notice">
        💡 本案共 <strong>${records.length}</strong> 筆公告,目前顯示最新一筆(${escapeHtml(latest.brief && latest.brief.type || '')})。
      </div>
    `;
  }

  for (const groupName of Object.keys(groups)) {
    const items = groups[groupName];
    if (items.length === 0) continue;

    html += `
      <section class="detail-section">
        <div class="detail-section-title">
          <span class="section-icon">${sectionIcons[groupName] || '·'}</span> ${groupName}
        </div>
        <dl class="detail-grid">
    `;
    for (const it of items) {
      let cls = '';
      if (it.label.indexOf('金額') !== -1) cls = 'amount';
      else if (it.label.indexOf('得標廠商') !== -1 || it.label.indexOf('廠商名稱') !== -1) cls = 'company';
      else if (it.label.indexOf('時間') !== -1) cls = 'time';
      html += `<dt>${escapeHtml(it.label)}</dt><dd class="${cls}">${escapeHtml(it.value)}</dd>`;
    }
    html += `</dl></section>`;
  }

  html += `
    <div class="detail-actions">
      <a href="${mainR.url}" target="_blank" rel="noopener">採購網原始公告 →</a>
      <a href="${mainR.altUrl}" target="_blank" rel="noopener" class="secondary">g0v 整理頁 →</a>
    </div>
  `;

  body.innerHTML = html;
}

// ESC 鍵與點背景關閉面板
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ----- Siblings (歷次重招) -----
function toggleSiblings(idx, ev) {
  ev.stopPropagation();
  const r = (window._sortedResults || [])[idx];
  if (!r) return;
  const box = document.getElementById('siblings-' + idx);
  const btn = ev.currentTarget;
  if (!box) return;

  if (box.style.display !== 'none') {
    box.style.display = 'none';
    btn.innerHTML = `展開歷次招標 (${r.siblings.length + 1}) ▾`;
    return;
  }

  box.style.display = 'block';
  btn.innerHTML = '收起 ▴';

  // 把主筆 + siblings 都列出來,依日期由新到舊
  const all = [r, ...r.siblings].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const rowsHtml = all.map((s, ii) => {
    const isMain = ii === 0;
    return `
      <a href="${s.url}" target="_blank" rel="noopener" class="sib-row${isMain ? ' sib-row-main' : ''}">
        <span class="tag tag-${s.type}" style="font-size:9px;padding:2px 6px;">${s.typeLabel}</span>
        <span class="sib-date">${fmtDate(s.date)}</span>
        <span class="sib-jobno">${escapeHtml(s.jobNo || '—')}</span>
        <span class="sib-amount">${s.amount > 0 ? fmtMoney(s.amount) : ''}</span>
        <span class="sib-link">${s.hasPccUrl ? '採購網 →' : '詳情頁 →'}</span>
      </a>
    `;
  }).join('');

  box.innerHTML = `
    <div class="sib-header">同標題歷次招標(依日期由新到舊)</div>
    <div class="sib-list">${rowsHtml}</div>
  `;
}

// ----- History expand -----
// 快取已抓過的案件歷史,避免重複呼叫 API
const historyCache = {};

// 從各種可能的欄位抓出廠商名稱(回傳去重後陣列)
function extractCompanies(rec, brief) {
  const names = new Set();
  brief = brief || {};

  // 收集可能的廠商名稱欄位
  const candidates = [
    brief.companies && brief.companies.names,
    brief.companies && brief.companies.name_key && Object.keys(brief.companies.name_key),
    brief.companies && brief.companies.id_key && Object.values(brief.companies.id_key),
    brief.companys && brief.companys.names,             // typo 變體
    rec.companies && rec.companies.names,
    rec.brief_companies && rec.brief_companies.names,
    brief.award && brief.award.companies,
    brief.award_companies,
    brief.winning_companies,
    brief.contractor_names,
    brief.vendor_names,
  ];

  // 逐個展開放進 set
  for (const c of candidates) {
    if (!c) continue;
    if (Array.isArray(c)) {
      for (const item of c) {
        if (typeof item === 'string' && item.trim()) names.add(item.trim());
        else if (item && typeof item === 'object' && item.name) names.add(item.name.trim());
      }
    } else if (typeof c === 'string' && c.trim()) {
      // 可能是逗號分隔字串
      c.split(/[,,、;;]/).forEach(s => { if (s.trim()) names.add(s.trim()); });
    }
  }

  // 嘗試從 detail 中的「採購資料:得標廠商」欄位 (深層資料才會有,通常 searchbytitle 抓不到)
  if (rec.detail && typeof rec.detail === 'object') {
    for (const k of Object.keys(rec.detail)) {
      if (k.indexOf('得標廠商') !== -1 || k.indexOf('得標廠商:廠商名稱') !== -1) {
        const v = rec.detail[k];
        if (typeof v === 'string' && v.trim()) names.add(v.trim());
      }
    }
  }

  return Array.from(names);
}

// 從各種可能的欄位抓出金額
function extractAmount(rec, brief) {
  brief = brief || {};
  const candidates = [
    brief.companies && brief.companies.amount,
    brief.amount,
    brief.budget,
    brief.award_amount,
    brief.total_amount,
    brief.predicted_amount,
    brief.budget_amount,
    rec.amount,
  ];
  for (const v of candidates) {
    if (v == null) continue;
    const n = Number(v);
    if (!isNaN(n) && n > 0) return n;
  }
  // 嘗試從 detail 抓
  if (rec.detail && typeof rec.detail === 'object') {
    for (const k of Object.keys(rec.detail)) {
      if (k.indexOf('預算金額') !== -1 || k.indexOf('決標金額') !== -1 || k.indexOf('總決標金額') !== -1) {
        const raw = rec.detail[k];
        if (raw) {
          const n = Number(String(raw).replace(/[^0-9]/g, ''));
          if (!isNaN(n) && n > 0) return n;
        }
      }
    }
  }
  return 0;
}

async function toggleHistory(idx, ev) {
  ev.stopPropagation();
  const r = (window._sortedResults || [])[idx];
  if (!r) return;
  const box = document.getElementById('history-' + idx);
  const btn = ev.currentTarget;
  if (!box) return;

  // 切換顯示
  if (box.style.display !== 'none') {
    box.style.display = 'none';
    btn.innerHTML = '查看本案所有公告 ▾';
    return;
  }

  box.style.display = 'block';
  btn.innerHTML = '收起 ▴';

  const cacheKey = r.unitId + '|' + r.jobNo;
  if (historyCache[cacheKey]) {
    renderHistory(box, historyCache[cacheKey], r);
    return;
  }

  box.innerHTML = `<div class="history-loading"><span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:-2px;"></span> 載入歷史紀錄...</div>`;

  try {
    const url = 'https://pcc-api.openfun.app/api/tender?unit_id=' +
                encodeURIComponent(r.unitId) +
                '&job_number=' + encodeURIComponent(r.jobNo);
    const res = await fetch(url);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const records = data.records || [];
    historyCache[cacheKey] = records;
    renderHistory(box, records, r);
  } catch (e) {
    box.innerHTML = `<div class="history-loading" style="color:var(--accent);">載入失敗:${escapeHtml(e.message)}。可能是網路或 API 暫時忙線,請稍後再試。</div>`;
  }
}

function renderHistory(box, records, r) {
  if (!records || records.length === 0) {
    box.innerHTML = '<div class="history-loading">這筆案件目前只有當前一筆公告,沒有其他歷史紀錄。</div>';
    return;
  }

  // 依日期由新到舊排序
  const sorted = [...records].sort((a, b) => String(b.date).localeCompare(String(a.date)));

  const rowsHtml = sorted.map(rec => {
    const brief = rec.brief || {};
    const t = brief.type || '';
    const tk = classifyType(t);
    const dotColors = {
      tender: 'var(--tender)', award: 'var(--award)',
      rental: 'var(--rental)', sell: 'var(--sell)',
      amend: 'var(--amend)', other: 'var(--other)'
    };
    const dotColor = dotColors[tk] || 'var(--text-faint)';
    const typeShort = t || '公告';

    // 萬用直連 URL — 所有 filename 前綴適用
    const filename = rec.filename || '';
    let recUrl = '';
    if (filename && rec.date) {
      recUrl = `https://web.pcc.gov.tw/prkms/tender/common/noticeDate/redirectPublic?ds=${rec.date}&fn=${encodeURIComponent(filename)}.xml`;
    }

    // 金額 — 多欄位包容嘗試
    const amtNum = extractAmount(rec, brief);
    const amtStr = amtNum > 0 ? fmtMoney(amtNum) : '';

    // 得標廠商 — 多欄位包容嘗試
    const companyNames = extractCompanies(rec, brief);
    let companyStr = '';
    if (companyNames.length > 0) {
      // 為了避免太長被截掉,多家廠商時顯示前 2 家 + "等 N 家"
      let displayNames;
      if (companyNames.length <= 2) {
        displayNames = companyNames.join('、');
      } else {
        displayNames = companyNames.slice(0, 2).join('、') + ` 等 ${companyNames.length} 家`;
      }
      const fullList = companyNames.join('、');
      companyStr = `<span class="hist-company" title="${escapeHtml(fullList)}">得標:${escapeHtml(displayNames)}</span>`;
    }

    // 整行用 g0v viewer 當主連結(若無採購網直連也能用),採購網直連另開於右側
    const altUrl = `https://openfunltd.github.io/pcc-viewer/tender.html?unit_id=${encodeURIComponent(r.unitId)}&job_number=${encodeURIComponent(r.jobNo)}&filename=${encodeURIComponent(filename)}`;
    const mainHref = recUrl || altUrl;

    return `
      <a href="${mainHref}" target="_blank" rel="noopener" class="hist-row">
        <div class="hist-dot" style="background:${dotColor};"></div>
        <div class="hist-date">${fmtDate(String(rec.date))}</div>
        <div class="hist-type">${escapeHtml(typeShort)}</div>
        <div class="hist-meta">
          ${amtStr ? `<span class="hist-amount">${amtStr}</span>` : ''}
          ${companyStr}
        </div>
        <div class="hist-link">
          ${recUrl ? '採購網 →' : '<span style="color:var(--text-faint);font-size:11px;">詳情頁 →</span>'}
        </div>
      </a>
    `;
  }).join('');

  box.innerHTML = `
    <div class="history-header">本案共 ${records.length} 筆公告</div>
    <div class="history-list">${rowsHtml}</div>
  `;
}

// ----- Export CSV -----
function exportCSV() {
  if (currentResults.length === 0) return;
  const headers = ['類型', '公告日期', '標案名稱', '機關', '金額', '連結'];
  const lines = [headers.join(',')];
  for (const r of currentResults) {
    const row = [
      r.typeLabel,
      fmtDate(r.date),
      r.title,
      r.unit,
      r.amount ? r.amount : '',
      r.url,
    ].map(v => {
      const s = String(v == null ? '' : v);
      return (s.includes(',') || s.includes('"') || s.includes('\n'))
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    });
    lines.push(row.join(','));
  }
  const csv = '\ufeff' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `標案_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('已下載 CSV 檔');
}

// ----- Reset -----
function reset() {
  $('query').value = '資訊';
  $('include').value = '';
  $('exclude').value = '維護, 保養';
  $('unit').value = '';
  $('pages').value = '3';
  $('date-from').value = '';
  $('date-to').value = '';
  document.querySelectorAll('.date-quick button').forEach(b => b.classList.remove('active'));
  currentTypes = new Set(['tender', 'award']);
  syncTypeCheckboxes();
  saveSettings();
  toast('條件已重置');
}

// ----- Date quick buttons -----
function setDateRange(days) {
  if (days === 0) {
    $('date-from').value = '';
    $('date-to').value = '';
  } else {
    const today = new Date();
    const from = new Date(today.getTime() - days * 86400000);
    const fmt = d => d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
    $('date-from').value = fmt(from);
    $('date-to').value = fmt(today);
  }
  document.querySelectorAll('.date-quick button').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.days) === days);
  });
}
document.querySelectorAll('.date-quick button').forEach(btn => {
  btn.addEventListener('click', () => setDateRange(parseInt(btn.dataset.days)));
});
// 日期框手動改也要清掉快速鈕高亮
['date-from', 'date-to'].forEach(id => {
  $(id).addEventListener('change', () => {
    document.querySelectorAll('.date-quick button').forEach(b => b.classList.remove('active'));
  });
});

// ----- Wire up -----
$('btn-search').addEventListener('click', search);
$('btn-export').addEventListener('click', exportCSV);
$('btn-reset').addEventListener('click', reset);
$('sort').addEventListener('change', renderResults);
document.querySelectorAll('.sb-input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
});

// 詳情面板關閉事件
document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-overlay').addEventListener('click', closeDetail);

loadSettings();
</script>
